name: Bug 报告
description: 报告代码问题、功能异常或回归
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈。请尽量写清楚复现步骤，并在粘贴日志前先去掉 token、私有域名、账号、IP 和本机路径。
  - type: input
    id: version
    attributes:
      label: 使用版本
      description: 例如 `v0.1.0`、某个 commit、或“本地未打 tag”
      placeholder: v0.1.0
    validations:
      required: true
  - type: input
    id: upstream
    attributes:
      label: 上游版本
      description: 当前项目默认适配的上游版本
      placeholder: claudecodeui v1.25.2
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: 问题范围
      options:
        - 桌面控制工具
        - 登录 / 设备审批
        - 手机聊天页面
        - 启动 / 停止脚本
        - nginx / 远程访问
        - 文档问题
        - 其他
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 请写成 1、2、3 的顺序
      placeholder: |
        1. 执行 ...
        2. 打开 ...
        3. 点击 ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望结果
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际结果
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 脱敏后的日志或截图说明
      description: 不要提交 secret、JWT、数据库内容、私有域名或完整本机路径
      render: shell
  - type: checkboxes
    id: confirm
    attributes:
      label: 提交前确认
      options:
        - label: 我已经先阅读过 README 和部署文档
          required: true
        - label: 我已经确认日志和截图里没有敏感信息
          required: true

